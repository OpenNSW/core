<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSW Phyto Permit Portal</title>
    <meta name="description" content="National Single Window – Phytosanitary Permit Application Portal">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --primary: #388bfd;
            --primary-hover: #58a6ff;
            --text: #e6edf3;
            --muted: #8b949e;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
            --cyan: #39d0d8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-badge {
            background: linear-gradient(135deg, #388bfd, #9f7aea);
            border-radius: 8px;
            padding: 6px 10px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-sub {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .launch-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .launch-bar label {
            font-size: 0.85rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .launch-bar input {
            flex: 1;
            min-width: 200px;
            max-width: 320px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .launch-bar input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 139, 253, .15);
        }

        .btn {
            border: none;
            border-radius: 6px;
            padding: 0.55rem 1.1rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--border);
        }

        .btn-success {
            background: var(--success);
            color: #000;
        }

        .btn-success:hover {
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(.97);
        }

        main {
            display: flex;
            flex: 1;
            gap: 0;
        }

        .portal-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            min-height: calc(100vh - 120px);
        }

        .portal-col:last-child {
            border-right: none;
        }

        .col-header {
            padding: 0.85rem 1.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .col-title {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-blue {
            background: var(--primary);
        }

        .dot-cyan {
            background: var(--cyan);
        }

        .col-body {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            flex: 1;
        }

        /* Task card */
        .task-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: border-color .2s;
        }

        .task-card:hover {
            border-color: var(--primary);
        }

        .card-top {
            padding: 0.9rem 1.1rem;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
        }

        .card-sub {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: monospace;
        }

        .badge {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: .04em;
            white-space: nowrap;
        }

        .badge-pending {
            background: rgba(56, 139, 253, .12);
            color: var(--primary);
            border: 1px solid rgba(56, 139, 253, .3);
        }

        .badge-queued {
            background: rgba(57, 208, 216, .12);
            color: var(--cyan);
            border: 1px solid rgba(57, 208, 216, .3);
        }

        .badge-done {
            background: rgba(63, 185, 80, .12);
            color: var(--success);
            border: 1px solid rgba(63, 185, 80, .3);
        }

        .badge-reject {
            background: rgba(248, 81, 73, .12);
            color: var(--danger);
            border: 1px solid rgba(248, 81, 73, .3);
        }

        .badge-info {
            background: rgba(210, 153, 34, .12);
            color: var(--warning);
            border: 1px solid rgba(210, 153, 34, .3);
        }

        .card-body {
            padding: 1rem 1.1rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        /* Form fields */
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .field label {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--muted);
        }

        .field input,
        .field select,
        .field textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.55rem 0.75rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.88rem;
            transition: border-color .15s;
            width: 100%;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 139, 253, .12);
        }

        .field input[readonly],
        .field textarea[readonly] {
            opacity: .6;
            cursor: default;
            background: var(--surface2);
        }

        .field-row {
            display: flex;
            gap: 0.75rem;
        }

        .field-row .field {
            flex: 1;
        }

        .section-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .07em;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.4rem;
            margin-bottom: 0.1rem;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-top: 0.1rem;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .radio-option input[type=radio] {
            accent-color: var(--primary);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .radio-option span {
            font-size: 0.88rem;
        }

        .feedback-box {
            background: rgba(248, 81, 73, .07);
            border-left: 3px solid var(--danger);
            border-radius: 0 6px 6px 0;
            padding: 0.6rem 0.75rem;
        }

        .feedback-box .fb-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--danger);
            margin-bottom: 0.2rem;
        }

        .feedback-box p {
            font-size: 0.85rem;
            margin: 0;
        }

        .queued-notice {
            background: rgba(57, 208, 216, .07);
            border: 1px solid rgba(57, 208, 216, .2);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: var(--cyan);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .history-card summary {
            padding: 0.85rem 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            list-style: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .history-card summary::-webkit-details-marker {
            display: none;
        }

        .history-body {
            padding: 0.85rem 1.1rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            color: var(--muted);
        }

        .history-body span b {
            color: var(--text);
        }

        .empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--muted);
            text-align: center;
            padding: 3rem;
        }

        .empty-icon {
            font-size: 2rem;
            opacity: .4;
        }

        .empty p {
            font-size: 0.88rem;
        }

        .dice {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 2px 4px;
            opacity: .6;
            transition: opacity .15s;
        }

        .dice:hover {
            opacity: 1;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrap input,
        .input-wrap textarea {
            padding-right: 2rem;
        }

        .input-wrap .dice {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
        }

        .input-wrap.ta-wrap .dice {
            top: 10px;
            transform: none;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <div class="logo-badge">NSW</div>
            <div>
                <div style="font-weight:600;font-size:1rem;">Phyto Permit Portal</div>
                <div class="header-sub">Data-Driven Orchestration Demo</div>
            </div>
        </div>
        <button class="btn btn-ghost" onclick="fetchTasks()">↻ Refresh</button>
    </header>

    <div class="launch-bar">
        <label for="applicantInput">Applicant Name</label>
        <input id="applicantInput" type="text" placeholder="e.g. Acme Farms Ltd." value="Acme Farms Ltd.">
        <button class="btn btn-primary" onclick="startWorkflow()">🚀 Launch Phyto Permit Application</button>
    </div>

    <main>
        <!-- User Portal -->
        <div class="portal-col">
            <div class="col-header">
                <div class="col-title">
                    <div class="dot dot-blue"></div> User Portal
                </div>
                <span style="font-size:.75rem;color:var(--muted);">PENDING_USER</span>
            </div>
            <div class="col-body" id="userCol">
                <div class="empty">
                    <div class="empty-icon">📋</div>
                    <p>No active tasks</p>
                </div>
            </div>
        </div>

        <!-- Reviewer Portal -->
        <div class="portal-col">
            <div class="col-header">
                <div class="col-title">
                    <div class="dot dot-cyan"></div> Reviewer Portal
                </div>
                <span style="font-size:.75rem;color:var(--muted);">QUEUED_EXTERNALLY</span>
            </div>
            <div class="col-body" id="reviewerCol">
                <div class="empty">
                    <div class="empty-icon">🔍</div>
                    <p>No pending reviews</p>
                </div>
            </div>
        </div>

        <!-- History -->
        <div class="portal-col">
            <div class="col-header">
                <div class="col-title">
                    <div class="dot" style="background:var(--muted)"></div> Completed
                </div>
            </div>
            <div class="col-body" id="historyCol">
                <div class="empty">
                    <div class="empty-icon">✅</div>
                    <p>Completed tasks appear here</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ── Form schema cache (keyed by form ID) ─────────────────────────────────────
        // Edit /static/forms/<id>.json to change what fields appear and how.
        const formCache = {};
        async function loadForm(formId) {
            if (formCache[formId]) return formCache[formId];
            const r = await fetch(`/forms/${formId}.json`);
            if (!r.ok) throw new Error(`form not found: ${formId}`);
            formCache[formId] = await r.json();
            return formCache[formId];
        }

        // ── JSONForms uischema interpreter ────────────────────────────────────────────
        // Resolves a scope like "#/properties/userform/properties/applicant_name"
        // to the corresponding schema property definition.
        function resolveScope(schema, scope) {
            const parts = scope.replace('#/', '').split('/');
            let cur = schema;
            for (const p of parts) { if (!cur) return {}; cur = cur[p]; }
            return cur || {};
        }

        // Converts a scope to a data path array, stripping "properties" segments.
        // e.g. "#/properties/userform/properties/crop_type" → ["userform", "crop_type"]
        function scopeToPath(scope) {
            return scope.replace('#/', '').split('/').filter(p => p !== 'properties');
        }

        function getNestedVal(obj, path) {
            return path.reduce((o, k) => (o != null ? o[k] : undefined), obj);
        }

        // Random fill values keyed by field name
        const RAND = {
            name: ["Acme Farms Ltd.", "Green Valley Co.", "Sunrise Orchards", "Blue Ridge Produce", "Coastal Growers"],
            loc: ["123 Farm Rd, Orange NSW 2800", "45 Valley Way, Bathurst NSW 2795", "88 Orchard Lane, Griffith NSW 2680"],
            crop: ["Apples", "Citrus", "Stone Fruit", "Grapes", "Mangoes"],
            dest: ["Japan", "China", "South Korea", "United States", "Singapore"],
            comment: ["Looks good, no issues.", "Please provide additional inspection docs.", "Approved pending final check.", "Commodities meet all requirements."],
            'farm_location':      ["123 Farm Rd, Orange NSW 2800", "45 Valley Way, Bathurst NSW 2795", "88 Orchard Lane, Griffith NSW 2680"],
            'crop_type':          ["Apples", "Citrus", "Stone Fruit", "Grapes", "Mangoes"],
            'export_destination': ["Japan", "China", "South Korea", "United States", "Singapore"],
            'reviewer_comments':  ["Looks good.", "Please provide inspection docs.", "Approved pending check.", "Meets all requirements."],
        };
        function fillRand(id, key) {
            const el = document.getElementById(id);
            if (el && RAND[key]) el.value = RAND[key][Math.floor(Math.random() * RAND[key].length)];
        }

        // ── Render a uischema Control element ─────────────────────────────────────────
        function renderControl(schema, element, data, uid) {
            const path    = scopeToPath(element.scope);
            const prop    = resolveScope(schema, element.scope);
            const label   = prop.title || path[path.length - 1];
            const opts    = element.options || {};
            const val     = getNestedVal(data, path) ?? '';
            const fieldId = uid + '_' + path.join('_');
            const isRO    = !!opts.readonly;
            let input = '';

            if (opts.format === 'radio' && prop.enum) {
                // Render radio buttons for enum fields (e.g. review_outcome)
                const icons = { approve: '✅', reject: '❌', needs_more_info: '🔄' };
                const radios = prop.enum.map(v =>
                    `<label class="radio-option"><input type="radio" name="${fieldId}" value="${v}" ${v === 'approve' ? 'checked' : ''}><span>${icons[v] || ''} ${v.replace(/_/g, ' ')}</span></label>`
                ).join('');
                input = `<div class="radio-group">${radios}</div>`;
            } else if (opts.multi) {
                const rk = path[path.length - 1];
                const rb = RAND[rk] ? `<button class="dice" onclick="fillRand('${fieldId}','${rk}')" title="Random">🎲</button>` : '';
                input = `<div class="input-wrap ta-wrap"><textarea id="${fieldId}" rows="2" placeholder="${opts.placeholder || ''}" ${isRO ? 'readonly' : ''}>${val}</textarea>${rb}</div>`;
            } else {
                const rk = path[path.length - 1];
                const rb = (!isRO && RAND[rk]) ? `<button class="dice" onclick="fillRand('${fieldId}','${rk}')" title="Random">🎲</button>` : '';
                input = `<div class="input-wrap"><input type="text" id="${fieldId}" value="${val}" placeholder="${opts.placeholder || ''}" ${isRO ? 'readonly' : ''} ${opts.detail ? `title="${opts.detail}"` : ''}>${rb}</div>`;
            }
            return `<div class="field"><label>${label}</label>${input}</div>`;
        }

        // ── Render any uischema element (recursive) ───────────────────────────────────
        function renderElement(schema, el, data, uid) {
            switch (el.type) {
                case 'VerticalLayout':
                    return el.elements.map(c => renderElement(schema, c, data, uid)).join('');
                case 'HorizontalLayout':
                    return `<div class="field-row">${el.elements.map(c => renderElement(schema, c, data, uid)).join('')}</div>`;
                case 'Group':
                    return `<div class="section-label">${el.label}</div>` + el.elements.map(c => renderElement(schema, c, data, uid)).join('');
                case 'Control':
                    return renderControl(schema, el, data, uid);
                default: return '';
            }
        }

        // ── Collect submitted values from rendered controls ───────────────────────────
        // Skips readonly fields. Groups values into their namespace (userform / reviewerform).
        function collectData(schema, uischema, uid) {
            const out = {};
            function walk(el) {
                if (el.type === 'Control') {
                    if (el.options?.readonly) return;
                    const path    = scopeToPath(el.scope);
                    const opts    = el.options || {};
                    const fieldId = uid + '_' + path.join('_');
                    let val = opts.format === 'radio'
                        ? document.querySelector(`input[name="${fieldId}"]:checked`)?.value
                        : document.getElementById(fieldId)?.value?.trim();
                    if (val == null) return;
                    let cur = out;
                    for (let i = 0; i < path.length - 1; i++) { cur[path[i]] = cur[path[i]] || {}; cur = cur[path[i]]; }
                    cur[path[path.length - 1]] = val;
                } else if (el.elements) {
                    el.elements.forEach(walk);
                }
            }
            walk(uischema);
            return out;
        }

        // ── API ──────────────────────────────────────────────────────────────────────
        async function startWorkflow() {
            const name = document.getElementById('applicantInput').value.trim() || 'Applicant';
            const r = await fetch('/api/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ applicant_name: name }) });
            if (r.ok) fetchTasks(); else alert('Failed: ' + await r.text());
        }
        async function fetchTasks() {
            try { const r = await fetch('/api/tasks'); renderAll(await r.json() || []); } catch (e) { console.error(e); }
        }
        async function submitTaskData(taskID, payload) {
            const r = await fetch('/api/task/' + taskID, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (r.ok) fetchTasks(); else alert('Submit failed: ' + await r.text());
        }

        // ── Render all three columns ──────────────────────────────────────────────────
        function renderAll(tasks) {
            const userCol = document.getElementById('userCol');
            const reviewerCol = document.getElementById('reviewerCol');
            const historyCol = document.getElementById('historyCol');            // Cards are async (they fetch JSON form schemas), use Promise chains
            pending.forEach(t   => renderUserCard(t).then(el => userCol.appendChild(el)).catch(console.error));
            queued.forEach(t    => renderReviewerCard(t).then(el => reviewerCol.appendChild(el)).catch(console.error));
            completed.forEach(t => historyCol.appendChild(renderHistoryCard(t)));
        }

        // ── User card — rendered from phyto_user_form_v1.json ────────────────────────
        async function renderUserCard(task) {
            const form = await loadForm(task.user_form_id || 'phyto_user_form_v1');
            const data = task.data || {};
            const tid  = task.task_id;
            const rf   = data.reviewerform || {};

            let feedback = '';
            if (rf.reviewer_comments) {
                feedback = `<div class="feedback-box"><div class="fb-label">⚠ Reviewer Feedback</div><p>${rf.reviewer_comments}</p></div>`;
            }

            const card = document.createElement('div');
            card.className = 'task-card';
            card.innerHTML = `
                <div class="card-top">
                    <div>
                        <div class="card-title">Phyto Sanitary Application</div>
                        <div class="card-sub">${tid} · schema: ${task.user_form_id || 'phyto_user_form_v1'}</div>
                    </div>
                    <span class="badge badge-pending">Pending User</span>
                </div>
                <div class="card-body">
                    ${feedback}
                    ${renderElement(form.schema, form.uischema, data, tid)}
                    <button class="btn btn-primary" id="submit_${tid}">Submit Application →</button>
                </div>`;

            card.querySelector(`#submit_${tid}`).addEventListener('click', () => {
                const payload = collectData(form.schema, form.uischema, tid);
                if (!payload.userform?.farm_location || !payload.userform?.crop_type || !payload.userform?.export_destination) {
                    alert('Please fill in all required consignment fields.'); return;
                }
                // applicant_name is readonly in schema — carry it forward from stored data
                if (data.userform?.applicant_name) {
                    payload.userform = payload.userform || {};
                    payload.userform.applicant_name = data.userform.applicant_name;
                }
                submitTaskData(tid, payload);
            });
            return card;
        }

        // ── Reviewer card — rendered from phyto_reviewer_form_v1.json ────────────────
        async function renderReviewerCard(task) {
            const form = await loadForm(task.reviewer_form_id || 'phyto_reviewer_form_v1');
            const data = task.data || {};
            const tid  = task.task_id;
            const uf   = data.userform || {};

            const card = document.createElement('div');
            card.className = 'task-card';
            card.innerHTML = `
                <div class="card-top">
                    <div>
                        <div class="card-title">Review: ${uf.applicant_name || 'Application'}</div>
                        <div class="card-sub">${tid} · schema: ${task.reviewer_form_id || 'phyto_reviewer_form_v1'}</div>
                    </div>
                    <span class="badge badge-queued">Queued Externally</span>
                </div>
                <div class="card-body">
                    ${renderElement(form.schema, form.uischema, data, tid)}
                    <button class="btn btn-success" id="submit_${tid}">Submit Review →</button>
                </div>`;

            card.querySelector(`#submit_${tid}`).addEventListener('click', () => {
                const payload = collectData(form.schema, form.uischema, tid);
                if (!payload.reviewerform?.review_outcome) {
                    alert('Please select a review decision.'); return;
                }
                submitTaskData(tid, payload);
            });
            return card;
        }

        // ── History card ──────────────────────────────────────────────────────────────
        function renderHistoryCard(task) {
            const uf = task.data?.userform || {};
            const rf = task.data?.reviewerform || {};
            const outcome = rf.review_outcome || 'unknown';
            const cls = outcome === 'approve' ? 'badge-done' : outcome === 'reject' ? 'badge-reject' : 'badge-info';
            const el = document.createElement('details');
            el.className = 'history-card';
            el.innerHTML = `
                <summary>
                    <span>${uf.applicant_name || task.task_id}</span>
                    <span class="badge ${cls}">${outcome.replace(/_/g, ' ')}</span>
                </summary>
                <div class="history-body">
                    <span><b>Task ID:</b> ${task.task_id}</span>
                    <span><b>Farm:</b> ${uf.farm_location || '—'}</span>
                    <span><b>Crop:</b> ${uf.crop_type || '—'} → ${uf.export_destination || '—'}</span>
                    <span><b>Comments:</b> ${rf.reviewer_comments || '—'}</span>
                </div>`;
            return el;
        }

        // ── Boot ──────────────────────────────────────────────────────────────────────
        fetchTasks();
        setInterval(fetchTasks, 4000);
    </script>
</body>

</html>
